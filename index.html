<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceio - Digital Marketing Agency</title>

  <!-- SEO -->
  <meta name="robots" content="index, follow">
  <meta name="description" content="We help businesses grow with social media marketing, SEO and paid ads.">

  <!-- IMPORTANT FIX: Minimal CSS to ensure visibility without JS -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    .section {
      opacity: 1 !important;
      visibility: visible !important;
      display: block !important;
    }

    .tab-panel {
      display: block !important; /* FIX: always visible */
    }

    .hidden {
      display: block !important;
    }
  </style>

  <!-- Your original CSS (keep below) -->
  <link rel="stylesheet" href="styles.css">

  <!-- Avoid render-blocking JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

  <!-- NOSCRIPT fallback for Google -->
  <noscript>
    <h1>Acceio - Digital Marketing Agency</h1>
    <p>We help businesses grow using SEO, social media and paid ads.</p>
  </noscript>

  <!-- MAIN CONTENT (ensure visible) -->
  <header class="section">
    <h1>Acceio</h1>
    <p>Your Growth Partner</p>
  </header>

  <section class="section">
    <h2>Our Services</h2>

    <!-- FIX: All tabs visible for Google -->
    <div class="tab-panel">
      <h3>Social Media Marketing</h3>
      <p>Grow your brand on Instagram, LinkedIn and more.</p>
    </div>

    <div class="tab-panel">
      <h3>SEO</h3>
      <p>Rank higher on Google and get organic traffic.</p>
    </div>

    <div class="tab-panel">
      <h3>Paid Ads</h3>
      <p>Run high-converting campaigns on Google & Meta.</p>
    </div>
  </section>

  <section class="section">
    <h2>Contact Us</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <!-- Your original JS -->
  <script defer src="script.js"></script>

</body>
</html>
